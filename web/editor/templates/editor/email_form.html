{% extends 'editor/index.html' %}
{% load static %}

<!-- Add the index's content to the main header block -->
{% block form %}

    <form id="email-form" class="form glass-container" method="post" action="{% url 'editor:email' %}">
        {% csrf_token %}
        <h3 class="form-title">Email</h3>

        <!-- Use Email -->
        <div class="form-input">
            <label>Use Email:</label>
            <input type="radio" name="use-email" value="true" required {% if email.use_email %}checked{% endif %}>
            <label>True</label>
            <input type="radio" name="use-email" value="false" {% if not email.use_email %}checked{% endif %}>
            <label>False</label>
        </div>

        <!-- Form submit button -->
        <div class="form-button-container">
            <button class="form-button" type="submit">Submit</button>
        </div>
    </form>

{% endblock %}
